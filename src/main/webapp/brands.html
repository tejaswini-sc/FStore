<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <title>Brands</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="home-page brands-page">

    <!-- NAVBAR -->

    <nav class="navbar">

        <h1>Fashion-BrandStore</h1>

        <ul>
        <li><a href="homepage.html">Home</a></li>
        <li><a href="homepage.html">Brands</a></li>
        <li><a href="wishlist.html">Wishlist</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="login.html">Logout</a></li>
        <li><a href="orders.html">Orders</a></li>
        <li>
            <button onclick="toggleTheme()" class="theme-btn">
                🌙
            </button>
        </li>
        
    </ul>

    </nav>


    <!-- SLIDER -->

    <section class="brand-slider" id="brandSlider">

    </section>


    <!-- TITLE -->

    <section class="search-section">

        <h2>Select Brand</h2>

        <p id="categoryTitle"></p>

    </section>


    <!-- BRAND CARDS -->

    <section class="categories" id="brandContainer">

    </section>



<script>

    /* =========================
       BRANDS
    ========================= */

    const brands = {

        watches: [
            "Fastrack",
            "Titan",
            "Casio",
            "Fossil",
            "Rolex",
            "Rado",
            "Armani Exchange"
        ],

        shoes: [
            "Puma",
            "Nike",
            "Adidas",
            "Woodland",
            "Campus",
            "Brikenstock",
            "Reebok",
            "Skechers"
        ],

        makeup: [
            "Lakme",
            "Maybelline",
            "Sugar",
            "MAC",
            "Nykaa",
            "L'Oreal",
            "Mamaearth"

        ],

        bags: [
            "Gucci",
            "Prada",
            "Michael Kors",
            "Coach",
            "Aldo",
            "Lavie",
            "Safari",
            "Skybags",
            "Wildcraft"
        ],

        dresses: [
            "Zudio",
            "H&M",
            "Lifestyle",
            "Zara",
            "Westside",
            "Manyavar",
        ]
    };



    /* =========================
       SLIDER IMAGES
    ========================= */

    const sliderImages = {

        watches: [

            "https://images.unsplash.com/photo-1523275335684-37898b6baf30",

            "https://images.unsplash.com/photo-1523170335258-f5ed11844a49",

            "https://images.unsplash.com/photo-1434056886845-dac89ffe9b56"
        ],

        shoes: [

            "https://images.unsplash.com/photo-1542291026-7eec264c27ff",

            "https://images.unsplash.com/photo-1549298916-b41d501d3772",

            "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"
        ],

        makeup: [

            "https://images.unsplash.com/photo-1596462502278-27bfdc403348",

            "https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9",

            "https://images.unsplash.com/photo-1487412947147-5cebf100ffc2"
        ],

        bags: [

            "https://images.unsplash.com/photo-1590874103328-eac38a683ce7",

            "https://images.unsplash.com/photo-1584917865442-de89df76afd3",

            "https://images.unsplash.com/photo-1553062407-98eeb64c6a62"
        ],

        dresses: [

            "https://images.unsplash.com/photo-1515372039744-b8f02a3ae446",

            "https://images.unsplash.com/photo-1496747611176-843222e1e57c",

            "https://images.unsplash.com/photo-1483985988355-763728e1935b"
        ]
    };



    /* =========================
       GET CATEGORY
    ========================= */

    /* =========================
    GET CATEGORY
 ========================= */

 const params = new URLSearchParams(window.location.search);

 let category = params.get("category");

 if(!category || !brands[category]){
     category = "shoes";
 }

 /* =========================
    TITLE
 ========================= */

 document.getElementById("categoryTitle").innerText =
 "Category : " + category;

 /* =========================
    CREATE SLIDER
 ========================= */

 const brandSlider =
 document.getElementById("brandSlider");

 sliderImages[category].forEach(function(image,index){

     brandSlider.innerHTML += `

         <div class="brand-slide ${index === 0 ? 'active' : ''}"

         style="
         background-image:
         linear-gradient(
         rgba(15,23,42,0.55),
         rgba(88,28,135,0.7)),
         url('${image}');
         ">

             <h2>
                 ${category.toUpperCase()} COLLECTION
             </h2>

             <p>
                 Explore premium ${category}
                 brands in one smart platform
             </p>

         </div>

     `;

 });

 /* =========================
    BRAND CARDS
 ========================= */

 const categoryMap = {

		    shoes: 1,
		    watches: 2,
		    makeup: 3,
		    bags: 4,
		    dresses: 5

		};
 
 
 const container =
 document.getElementById("brandContainer");

 brands[category].forEach(function(brand){

     container.innerHTML += `
    	 <a href="products.html?category=${categoryMap[category]}&brand=${encodeURIComponent(brand)}"
 
            class="brand-card">

             <div class="brand-logo">

                 ${brand.charAt(0)}

             </div>

             <h3>${brand}</h3>

             <p>View Products</p>

         </a>

     `;

 });

 /* =========================
    AUTO SLIDER
 ========================= */

 let slides =
 document.querySelectorAll(".brand-slide");

 let currentSlide = 0;

 if(slides.length > 0){

     setInterval(function(){

         slides[currentSlide].classList.remove("active");

         currentSlide++;

         if(currentSlide >= slides.length){

             currentSlide = 0;

         }

         slides[currentSlide].classList.add("active");

     },3000);

 }</script>
<script>

function toggleTheme(){

    document.body.classList.toggle("light-mode");

    if(document.body.classList.contains("light-mode")){

        localStorage.setItem("theme","light");

    }

    else{

        localStorage.setItem("theme","dark");

    }

}

if(localStorage.getItem("theme") === "light"){

    document.body.classList.add("light-mode");

}

</script>

</body>
</html>
